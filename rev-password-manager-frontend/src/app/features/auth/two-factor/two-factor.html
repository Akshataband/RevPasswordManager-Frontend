<div class="twofactor-container">

  <h2>Two-Factor Authentication</h2>

  <p *ngIf="!isEnabled">2FA is currently DISABLED</p>
  <p *ngIf="isEnabled">2FA is currently ENABLED</p>

  <button *ngIf="!isEnabled" class="btn-primary" (click)="enable2FA()">
    Enable 2FA
  </button>

  <div *ngIf="qrCode">
    <img [src]="qrCode" width="200" />
    <input type="text" [(ngModel)]="code" placeholder="Enter OTP">
    <button class="btn-primary" (click)="confirm2FA()">Confirm</button>
  </div>

  <div *ngIf="isEnabled">
    <input type="text" [(ngModel)]="code" placeholder="Enter OTP">
    <button class="btn-outline" (click)="disable2FA()">Disable 2FA</button>
  </div>

</div>
